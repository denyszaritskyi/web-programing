<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Лабораторна робота 5</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <button id="theme-toggle"><b>Перемкнути тему</b></button>

    <h2>Коментарі роботодавців</h2>
    <div id="comments-container">Завантаження коментарів...</div>

    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal" id="feedback-modal">
      <h3>Зворотний зв'язок</h3>
      <form action="https://formspree.io/f/mdawrqdl" method="POST">
        <input type="text" name="name" placeholder="Ім'я" required />
        <input type="email" name="email" placeholder="Email" required />
        <input type="tel" name="phone" placeholder="Номер телефону" required />
        <textarea
          name="message"
          rows="4"
          placeholder="Ваш текст"
          required
        ></textarea>
        <button type="submit">Відправити</button>
      </form>
    </div>

    <footer>
      <strong>Інформація про систему:</strong>
      <p id="os-info"></p>
    </footer>

    <script>
      const userInfo = navigator.userAgent;
      // Зберігаємо у localStorage
      localStorage.setItem("os_browser_info", userInfo);
      // Відображаємо у футері сайту
      document.getElementById("os-info").innerText =
        localStorage.getItem("os_browser_info");

      fetch("https://jsonplaceholder.typicode.com/posts/7/comments")
        .then((response) => response.json())
        .then((comments) => {
          const container = document.getElementById("comments-container");
          container.innerHTML = "";

          // Відображаємо коментарі [cite: 11]
          comments.forEach((comment) => {
            const div = document.createElement("div");
            div.style.marginBottom = "15px";
            div.style.padding = "10px";
            div.style.background = "var(--container-bg)";
            div.style.borderRadius = "5px";

            div.innerHTML = `
                        <strong>${comment.name}</strong> (${comment.email})
                        <p>${comment.body}</p>
                    `;
            container.appendChild(div);
          });
        })
        .catch((error) => console.error("Помилка завантаження:", error));

      setTimeout(() => {
        document.getElementById("feedback-modal").classList.add("active");
        document.getElementById("modal-overlay").classList.add("active");
      }, 60000);

      const currentHour = new Date().getHours();

      if (currentHour >= 7 && currentHour < 21) {
        document.body.classList.remove("dark-mode");
      } else {
        document.body.classList.add("dark-mode");
      }

      document.getElementById("theme-toggle").addEventListener("click", () => {
        document.body.classList.toggle("dark-mode");
      });
    </script>
  </body>
</html>
